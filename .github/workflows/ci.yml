name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: web

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Lint includes the design-system guard (lint:ds) — fails on bespoke UI (BR-2).
      - run: npm run lint
      - run: npm run check
      - run: npm run build
